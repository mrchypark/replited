name: Branch Docker Image

on:
  push:
    branches:
      - feature/replited-replica-recovery-fixes

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mrchypark/replited
          tags: |
            type=raw,value=replica-fix-${{ github.sha }}
            type=raw,value=replica-fix-${{ github.sha_short }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dev
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
