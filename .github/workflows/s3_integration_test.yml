name: S3 integration test

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-24.04
    services:
      localstack:
        image: localstack/localstack:3.7.2
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          AWS_DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: 'Checkout codes'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup

      - name: Install AWS CLI
        shell: bash
        run: |
          python3 -m pip install --user awscli
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Prepare LocalStack bucket
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws --endpoint-url=http://127.0.0.1:4566 s3 mb s3://replited-itest || true

      - name: 'Run integration test for s3'
        shell: bash
        env:
          REPLITED_TEST_S3_ENDPOINT: http://127.0.0.1:4566
          REPLITED_TEST_S3_BUCKET: replited-itest
          REPLITED_TEST_S3_REGION: us-east-1
          REPLITED_TEST_S3_ACCESS_KEY_ID: test
          REPLITED_TEST_S3_SECRET_ACCESS_KEY: test
          REPLITED_TEST_S3_ROOT: /replited
        run: |
          python3 -m unittest tests.integration_test
          cargo build --release
          python3 tests/integration_test.py 12000 ./target/release/replited --backend s3
