name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish as a Docker image (e.g., v0.4.0)'
        required: true
        type: string
      latest:
        description: 'Also publish the image as latest'
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to publish as a Docker image (e.g., v0.4.0)'
        required: true
        type: string
      latest:
        description: 'Also publish the image as latest'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04

    steps:
      - name: Validate tag
        id: release
        run: |
          TAG="${{ inputs.tag }}"
          if ! printf '%s\n' "${TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "tag must look like vX.Y.Z or vX.Y.Z-prerelease: ${TAG}" >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Download Linux release assets
        run: |
          sudo apt-get update
          sudo apt-get install -y file binutils

          mkdir -p artifacts docker-context
          gh release download "${{ steps.release.outputs.tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 'replited-linux-*' \
            --dir artifacts

          test -s artifacts/replited-linux-amd64
          test -s artifacts/replited-linux-arm64

          file artifacts/replited-linux-amd64 artifacts/replited-linux-arm64
          for artifact in artifacts/replited-linux-amd64 artifacts/replited-linux-arm64; do
            readelf -l "${artifact}"
            if ! file "${artifact}" | grep -Eq 'statically linked|static-pie linked'; then
              echo "${artifact} must be static so the Docker image binary can be reused in Alpine app containers" >&2
              exit 1
            fi
            if readelf -l "${artifact}" | grep -q 'INTERP'; then
              echo "${artifact} must not have an ELF interpreter" >&2
              exit 1
            fi
          done

          cp artifacts/replited-linux-amd64 docker-context/replited-amd64
          cp artifacts/replited-linux-arm64 docker-context/replited-arm64
          chmod +x docker-context/replited-*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Smoke test Linux artifacts in Alpine and Debian
        run: |
          for arch in amd64 arm64; do
            for image in alpine:3.20 debian:bookworm-slim; do
              docker run --rm --platform "linux/${arch}" \
                -v "$PWD/artifacts:/artifacts:ro" \
                "${image}" \
                "/artifacts/replited-linux-${arch}" --version
            done
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          context: git
          images: |
            name=ghcr.io/mrchypark/replited
          flavor: |
            latest=${{ inputs.latest }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{major}},value=${{ steps.release.outputs.tag }}
            type=sha,enable=true,priority=100,prefix={{date 'YYYYMMDD' tz='Asia/Seoul'}}-,suffix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
