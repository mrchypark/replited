name: Fs integration test

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout codes'
        uses: actions/checkout@v4
        with:
          # fetch depth set to 0 to make sure we have correct diff result.
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup

      - name: 'Run integration test for fs'
        shell: bash
        run: |
          python3 -m unittest tests.integration_test
          cargo build --release
          python3 tests/integration_test.py 12000 ./target/release/replited --backend fs
