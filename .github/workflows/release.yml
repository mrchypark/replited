name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            name: linux-amd64
            platform: linux/amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04
            name: linux-arm64
            platform: linux/arm64
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.88.0
          target: ${{ matrix.target }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler file binutils

      - name: Install musl tools (Linux AMD64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install cross (Linux ARM64 musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --version 0.2.5 --locked

      - name: Build with cross (Linux ARM64 musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build with cargo (other targets)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/replited dist/replited-${{ matrix.name }}
          chmod +x dist/replited-${{ matrix.name }}

      - name: Verify Linux artifact is static
        if: runner.os == 'Linux'
        run: |
          bin="dist/replited-${{ matrix.name }}"
          file "${bin}"
          readelf -l "${bin}"
          if ! file dist/replited-${{ matrix.name }} | grep -Eq 'statically linked|static-pie linked'; then
            echo "Linux release artifact must be static so it can run in Alpine app containers" >&2
            exit 1
          fi
          if readelf -l "${bin}" | grep -q 'INTERP'; then
            echo "Linux release artifact must not have an ELF interpreter" >&2
            exit 1
          fi

      - name: Set up QEMU for Linux smoke tests
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Smoke test Linux artifact in Alpine and Debian
        if: runner.os == 'Linux'
        run: |
          for image in alpine:3.20 debian:bookworm-slim; do
            docker run --rm --platform "${{ matrix.platform }}" \
              -v "$PWD/dist:/dist:ro" \
              "${image}" \
              "/dist/replited-${{ matrix.name }}" --version
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: replited-${{ matrix.name }}
          path: dist/replited-${{ matrix.name }}*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(inputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: release
    uses: ./.github/workflows/docker_publish.yml
    with:
      tag: ${{ inputs.tag }}
      latest: ${{ !contains(inputs.tag, '-') }}
    permissions:
      contents: read
      packages: write
