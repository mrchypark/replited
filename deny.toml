[graph]
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
  "RUSTSEC-2025-0052",
  "RUSTSEC-2025-0134",
  "RUSTSEC-2026-0049",
  "RUSTSEC-2023-0071",
]

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "LGPL-2.1-or-later",
  "MPL-2.0",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",
  "Zlib",
]
confidence-threshold = 0.92

[[licenses.clarify]]
crate = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
