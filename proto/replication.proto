syntax = "proto3";

package replication;

service Replication {
  rpc StreamWal(StreamWalRequest) returns (stream StreamWalResponse);
  rpc StreamSnapshot(StreamSnapshotRequest) returns (stream StreamSnapshotResponse);
  rpc AckLsn(AckLsnRequest) returns (AckLsnResponse);
}

message LsnToken {
  string generation = 1;
  uint64 index = 2;
  uint64 offset = 3;
}

message StreamWalRequest {
  string db_identity = 1;
  string replica_id = 2;
  string session_id = 3;
  LsnToken start_lsn = 4;
}

message WalChunk {
  LsnToken start_lsn = 1;
  LsnToken next_lsn = 2;
  bytes wal_bytes = 3;
}

message StreamWalResponse {
  oneof payload {
    WalChunk chunk = 1;
    StreamError error = 2;
  }
}

message StreamSnapshotRequest {
  string db_identity = 1;
  string replica_id = 2;
  string session_id = 3;
  LsnToken start_lsn = 4;
}

message SnapshotMeta {
  string db_identity = 1;
  string generation = 2;
  LsnToken boundary_lsn = 3;
  uint32 page_size = 4;
  uint64 snapshot_size_bytes = 5;
  bytes snapshot_sha256 = 6;
}

message StreamSnapshotResponse {
  oneof payload {
    SnapshotMeta meta = 1;
    bytes chunk = 2;
    StreamError error = 3;
  }
}

message AckLsnRequest {
  string db_identity = 1;
  string replica_id = 2;
  string session_id = 3;
  LsnToken last_applied_lsn = 4;
}

message AckLsnResponse {
  bool accepted = 1;
  StreamError error = 2;
}

message StreamError {
  enum Code {
    UNKNOWN = 0;
    LINEAGE_MISMATCH = 1;
    WAL_NOT_RETAINED = 2;
    SNAPSHOT_BOUNDARY_MISMATCH = 3;
    INVALID_LSN = 4;
  }
  Code code = 1;
  string message = 2;
  uint32 retry_after_ms = 3;
}
